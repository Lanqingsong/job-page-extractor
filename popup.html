<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Page Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>Job Extractor</h1>
          <p id="siteHint">Open a job list or detail page to collect postings</p>
        </div>
        <span id="statusDot" class="dot idle"></span>
      </header>

      <section class="controls">
        <label>
          Scroll rounds
          <input id="scrollRounds" type="number" min="0" max="30" value="8" />
        </label>
        <label>
          Wait per round (ms)
          <input id="waitMs" type="number" min="300" max="5000" step="100" value="1200" />
        </label>
      </section>

      <label class="check">
        <input id="includeDetails" type="checkbox" />
        <span>Keep card raw text</span>
      </label>

      <label class="check">
        <input id="autoDetail" type="checkbox" />
        <span>Auto-save supported job detail pages</span>
      </label>

      <button id="collectBtn" class="primary">Collect Current List Page</button>
      <button id="detailBtn" class="secondary">Collect Current Detail Page</button>

      <section class="result">
        <div class="metric">
          <span>This run</span>
          <strong id="count">0</strong>
        </div>
        <div class="metric">
          <span>Local total</span>
          <strong id="totalCount">0</strong>
        </div>
      </section>

      <div class="actions">
        <button id="copyBtn" disabled>Copy JSON</button>
        <button id="csvBtn" disabled>Download CSV</button>
        <button id="jsonBtn" disabled>Download JSON</button>
      </div>
      <button id="clearBtn" class="ghost" disabled>Clear Local Dataset</button>

      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
